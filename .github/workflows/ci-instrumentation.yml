name: "🧪 Instrumentation Test Matrix"

on:
  workflow_call:

jobs:

  instrumentation:
    name: "${{ matrix.api }}"

    uses: TWiStErRob/github-workflows/.github/workflows/instrumentation.yml@104620e2c495f0c905fde6f15ea2b6453ae4eaed # v3
    with:
      android-api: ${{ matrix.api }}
      timeout-minutes: 60
      java-version: 21
      # language=bash
      script: |
        ./gradlew --no-daemon --no-configuration-cache --no-build-cache --continue --stacktrace connectedCheck :mergeAndroidReports

    permissions:
      contents: read
      checks: write
      statuses: write

    strategy:
      fail-fast: false
      matrix:
        # The API level, see https://apilevels.com/.
        api:
          - 21 # A stable version for now.
